# Application Name
spring.application.name=meliani-trans

# Server Port
server.port=${PORT:8080}

# PostgreSQL Database Configuration
# Railway DATABASE_URL can be either:
# - postgres://<user>:<password>@<host>:<port>/<database>
# - jdbc:postgresql://<host>:<port>/<database>
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/meliani_trans}
spring.datasource.username=${DB_USERNAME:meliani}
spring.datasource.password=${DB_PASSWORD:meliani}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

# JWT Configuration
jwt.secret=${JWT_SECRET:change-this-local-dev-secret-to-a-long-random-value}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# Admin Default Credentials
admin.default.email=${ADMIN_EMAIL:Meliani@gmail.com}
admin.default.password=${ADMIN_PASSWORD:Meliani@123}

# Logging
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
logging.level.com.melianitrans=${APP_LOG_LEVEL:INFO}

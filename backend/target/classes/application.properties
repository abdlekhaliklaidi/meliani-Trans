# Application Name
spring.application.name=meliani-trans

# Server Port
server.port=8080

# PostgreSQL Database Configuration - Cloud PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/melianitrans}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# jwt.secret=${JWT_SECRET:melianiTransSecretKey2024SecureTransportApplication}
jwt.secret=8f9a7c6e5d4b3a2910f8e7d6c5b4a3928172635445566778899aabbccddeeff1122334455667788
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# Admin Default Credentials
admin.default.email=Meliani@gmail.com
admin.default.password=Meliani@123

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.melianitrans=DEBUG
